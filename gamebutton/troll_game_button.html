<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Impossible Easy Game</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #22203a;
    --accent: #ff6b35;
    --accent2: #ffe66d;
    --good: #4ecdc4;
    --bad: #e74c3c;
    --text: #fffffe;
    --muted: #a7a9be;
    --radius: 18px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── CANVAS EFFECTS ── */
  #particle-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ══════════════════════════════════════
     ÉCRAN D'INTRO
  ══════════════════════════════════════ */
  #intro-screen {
    position: fixed;
    inset: 0;
    z-index: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.5s ease;
  }
  #intro-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* Lignes décoratives haut/bas */
  #intro-top-line, #intro-bottom-line {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent2) 50%, var(--accent) 70%, transparent 100%);
  }
  #intro-top-line    { top: 0; }
  #intro-bottom-line { bottom: 0; }

  /* Badge */
  #intro-badge {
    font-family: 'Baloo 2', cursive;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(255,107,53,0.4);
    border-radius: 30px;
    padding: 5px 18px;
    margin-bottom: 32px;
    background: rgba(255,107,53,0.08);
  }

  /* "THE" */
  #intro-the {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(14px, 2.5vw, 22px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 10px;
    text-align: center;
    margin-bottom: 4px;
  }

  /* Titre */
  #intro-title {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(40px, 9vw, 92px);
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    text-align: center;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  #intro-title span { color: var(--accent); }

  /* Séparateur */
  #intro-divider {
    width: 56px; height: 2px;
    background: rgba(255,107,53,0.35);
    border-radius: 2px;
    margin: 26px auto 26px;
  }

  /* Citation */
  #intro-quote {
    font-size: clamp(13px, 2vw, 16px);
    font-style: italic;
    color: var(--accent2);
    font-weight: 600;
    text-align: center;
    max-width: 380px;
    line-height: 1.6;
    margin-bottom: 48px;
    opacity: 0.85;
  }
  #intro-quote::before { content: '\201C'; }
  #intro-quote::after  { content: '\201D'; }

  /* Bouton PLAY */
  #intro-play-btn {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 800;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 18px 68px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.12s, filter 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 32px rgba(255,107,53,0.45);
  }
  #intro-play-btn:hover {
    filter: brightness(1.12);
    transform: scale(1.05);
    box-shadow: 0 8px 42px rgba(255,107,53,0.62);
  }
  #intro-play-btn:active { transform: scale(0.97); }

  /* Hint son */
  #intro-hint {
    margin-top: 20px;
    font-size: 12px;
    color: rgba(167,169,190,0.45);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ── MAIN WRAPPER ── */
  #app {
    position: relative;
    z-index: 1;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(15,14,23,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 100;
  }
  #hud-title { font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
  #hud-stage { font-size: 13px; color: var(--muted); font-weight: 600; }
  #hud-tries { font-size: 13px; color: var(--muted); font-weight: 600; }

  /* ── TIMER RING ── */
  #timer-wrap { position: relative; width: 80px; height: 80px; margin-bottom: 18px; flex-shrink: 0; }
  #timer-svg { transform: rotate(-90deg); }
  #timer-ring-bg { stroke: rgba(255,255,255,0.08); }
  #timer-ring { stroke: var(--accent); stroke-linecap: round; transition: stroke 0.3s; }
  #timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 26px; font-weight: 800; color: var(--text);
  }

  /* ── NARRATOR ── */
  #narrator-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 12px 22px;
    margin-bottom: 18px; max-width: 560px;
    text-align: center; min-height: 54px;
    display: flex; align-items: center; justify-content: center;
  }
  #narrator-text { font-size: 16px; font-style: italic; color: var(--accent2); font-weight: 600; line-height: 1.4; }
  #narrator-icon { margin-right: 8px; font-size: 18px; }

  /* ── INSTRUCTION ── */
  #instruction-box { margin-bottom: 22px; text-align: center; max-width: 580px; }
  #instruction-text { font-family: 'Baloo 2', cursive; font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.2; }
  #sub-instruction { font-size: 14px; color: var(--muted); margin-top: 6px; font-weight: 600; }

  /* ── GAME AREA ── */
  #game-area {
    position: relative; width: 100%; max-width: 620px;
    min-height: 220px; display: flex;
    align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 14px;
  }

  /* ── BUTTONS ── */
  .g-btn {
    font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 700;
    border: none; border-radius: var(--radius); padding: 16px 28px;
    cursor: pointer; transition: transform 0.08s, filter 0.15s;
    outline: none; position: relative; letter-spacing: 0.5px; min-width: 110px;
  }
  .g-btn:hover { filter: brightness(1.15); }
  .g-btn:active { transform: scale(0.93); }
  .g-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
  .btn-red    { background: #e74c3c; color: #fff; }
  .btn-green  { background: #2ecc71; color: #1a1a1a; }
  .btn-blue   { background: #3498db; color: #fff; }
  .btn-yellow { background: #f1c40f; color: #1a1a1a; }
  .btn-orange { background: #e67e22; color: #fff; }
  .btn-purple { background: #9b59b6; color: #fff; }
  .btn-teal   { background: #1abc9c; color: #1a1a1a; }
  .btn-pink   { background: #e91e8c; color: #fff; }
  .btn-dark   { background: #2c3e50; color: #fff; border: 1px solid rgba(255,255,255,0.15); }

  /* ── FAKE IMAGE ── */
  .fake-img {
    border-radius: 14px; border: 2px solid rgba(255,255,255,0.1);
    overflow: hidden; position: relative; cursor: pointer;
    transition: transform 0.1s; flex-shrink: 0;
  }
  .fake-img:hover { transform: scale(1.03); }
  .fake-img canvas { display: block; }
  .fake-img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 13px; font-weight: 700;
    text-align: center; padding: 6px; letter-spacing: 0.5px;
  }

  /* ── PROGRESS DOTS ── */
  #progress-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .pdot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.12); transition: background 0.3s, transform 0.2s; }
  .pdot.done    { background: var(--good); transform: scale(1.2); }
  .pdot.fail    { background: var(--bad); }
  .pdot.current { background: var(--accent); transform: scale(1.3); }

  /* ── FEEDBACK FLASH ── */
  #feedback-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
  }
  #feedback-overlay.show { opacity: 1; }
  #feedback-msg {
    font-family: 'Baloo 2', cursive; font-size: 52px; font-weight: 800;
    text-align: center; padding: 20px 40px; border-radius: 24px;
    letter-spacing: 1px; text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  #feedback-msg.win  { background: rgba(46,204,113,0.22); color: #2ecc71; border: 2px solid rgba(46,204,113,0.3); }
  #feedback-msg.fail { background: rgba(231,76,60,0.22);  color: #e74c3c; border: 2px solid rgba(231,76,60,0.3); }
  #feedback-msg.fake { background: rgba(241,196,15,0.22); color: #f1c40f; border: 2px solid rgba(241,196,15,0.3); }

  /* ── NEXT STAGE ── */
  #next-btn {
    display: none; font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 700;
    background: var(--good); color: #0f0e17; border: none; border-radius: 16px;
    padding: 16px 48px; cursor: pointer; margin-top: 18px;
    transition: filter 0.15s, transform 0.1s;
    animation: fadeSlideUp2 0.4s ease forwards;
    box-shadow: 0 4px 28px rgba(78,205,196,0.35); letter-spacing: 0.5px;
  }
  #next-btn:hover { filter: brightness(1.15); transform: scale(1.04); }
  #next-btn:active { transform: scale(0.96); }
  @keyframes fadeSlideUp2 {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── WIN SCREEN ── */
  #win-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; }
  #win-emoji { font-size: 72px; animation: bounce 0.6s infinite alternate; }
  @keyframes bounce { to { transform: translateY(-14px); } }
  #win-title { font-family: 'Baloo 2', cursive; font-size: 42px; font-weight: 800; color: var(--good); }
  #win-stats { font-size: 16px; color: var(--muted); font-weight: 600; }
  #close-btn {
    font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: 14px;
    padding: 14px 40px; cursor: pointer; margin-top: 8px; transition: filter 0.15s;
  }
  #close-btn:hover { filter: brightness(1.15); }

  /* ── DEATH SCREEN ── */
  #fail-screen {
    display: none; position: fixed; inset: 0; z-index: 500;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 0; background: #0a0000; overflow: hidden;
  }
  #fail-screen::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(180,0,0,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(150,0,0,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 40%, rgba(200,0,0,0.10) 0%, transparent 50%);
    pointer-events: none;
  }
  #fail-scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
    pointer-events: none; z-index: 1;
  }
  #fail-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; padding: 20px; }
  #fail-big {
    font-family: 'Baloo 2', cursive; font-size: clamp(52px, 13vw, 120px);
    font-weight: 800; color: #ff1a1a; letter-spacing: 4px; line-height: 1;
    text-shadow: 0 0 20px rgba(255,0,0,0.8), 0 0 60px rgba(255,0,0,0.4), 4px 4px 0px #7a0000, 8px 8px 0px #3a0000;
    animation: failPulse 0.5s ease-in-out infinite alternate, failGlitch 2.5s infinite; margin-bottom: 6px;
  }
  @keyframes failPulse {
    from { transform: scale(1); text-shadow: 0 0 20px rgba(255,0,0,0.8), 0 0 60px rgba(255,0,0,0.4), 4px 4px 0 #7a0000, 8px 8px 0 #3a0000; }
    to   { transform: scale(1.04); text-shadow: 0 0 40px rgba(255,0,0,1), 0 0 100px rgba(255,0,0,0.6), 4px 4px 0 #7a0000, 8px 8px 0 #3a0000; }
  }
  @keyframes failGlitch {
    0%, 90%, 100% { clip-path: none; transform: scale(1) translate(0,0); }
    91% { clip-path: inset(10% 0 70% 0); transform: scale(1.04) translate(-6px, 0); color: #ff6666; }
    92% { clip-path: inset(60% 0 10% 0); transform: scale(1.04) translate(6px, 0); color: #ff0000; }
    93% { clip-path: inset(30% 0 50% 0); transform: scale(1.04) translate(-3px, 0); }
    94% { clip-path: none; transform: scale(1.04) translate(0,0); }
  }
  #fail-sub-big {
    font-family: 'Baloo 2', cursive; font-size: clamp(18px, 4vw, 32px);
    font-weight: 800; color: #ff6666; letter-spacing: 2px; margin-bottom: 22px;
    opacity: 0; animation: fadeSlideUp 0.4s 0.35s ease forwards;
  }
  #fail-reason-box {
    background: rgba(255,20,20,0.08); border: 1px solid rgba(255,50,50,0.25);
    border-radius: 14px; padding: 14px 28px; max-width: 500px; margin-bottom: 16px;
    opacity: 0; animation: fadeSlideUp 0.4s 0.6s ease forwards;
  }
  #fail-msg { font-size: 17px; color: #ffaaaa; font-weight: 700; line-height: 1.4; }
  #fail-narrator-box {
    background: rgba(255,200,0,0.07); border: 1px solid rgba(255,200,0,0.2);
    border-radius: 12px; padding: 12px 24px; max-width: 520px; margin-bottom: 28px;
    opacity: 0; animation: fadeSlideUp 0.4s 0.85s ease forwards;
  }
  #fail-narrator-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #ffe66d; text-transform: uppercase; margin-bottom: 5px; }
  #fail-narrator-line { font-size: 16px; font-style: italic; color: #ffe66d; font-weight: 600; line-height: 1.4; }
  #fail-retry {
    font-family: 'Baloo 2', cursive; font-size: 18px; font-weight: 700;
    background: #e74c3c; color: #fff; border: none; border-radius: 14px;
    padding: 14px 44px; cursor: pointer; transition: filter 0.15s, transform 0.1s;
    opacity: 0; animation: fadeSlideUp 0.4s 1.1s ease forwards;
    box-shadow: 0 4px 24px rgba(231,76,60,0.4);
  }
  #fail-retry:hover { filter: brightness(1.2); transform: scale(1.04); }
  #fail-retry:active { transform: scale(0.96); }
  #fail-attempt-count {
    font-size: 13px; color: rgba(255,255,255,0.25); margin-top: 12px;
    font-weight: 600; opacity: 0; animation: fadeSlideUp 0.4s 1.2s ease forwards;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fail-spark { position: absolute; border-radius: 50%; pointer-events: none; animation: sparkFly 0.9s ease-out forwards; }
  @keyframes sparkFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
  }
  #fail-flash {
    position: absolute; inset: 0; background: #ff0000; opacity: 0;
    pointer-events: none; z-index: 10; animation: flashIn 0.55s ease-out forwards;
  }
  @keyframes flashIn { 0% { opacity: 0.75; } 100% { opacity: 0; } }

  /* ── MISC ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-12px); } 40% { transform: translateX(12px); }
    60% { transform: translateX(-8px); }  80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.45s ease; }
  .moving-btn { position: absolute !important; transition: left 0.18s ease, top 0.18s ease; }
  #main-content { display: flex; flex-direction: column; align-items: center; width: 100%; }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<!-- ══════════════════════════════════
     ÉCRAN D'INTRO
══════════════════════════════════ -->
<div id="intro-screen">
  <div id="intro-top-line"></div>
  <div id="intro-bottom-line"></div>

  <div id="intro-badge">8 Stages &nbsp;·&nbsp; Are you ready?</div>

  <div id="intro-the">T &nbsp; H &nbsp; E</div>
  <div id="intro-title">IMPOSSIBLE<br><span>EASY</span> GAME</div>

  <div id="intro-divider"></div>

  <div id="intro-quote">This game is very easy. Trust me.</div>

  <button id="intro-play-btn" onclick="startFromIntro()">&#9654;&nbsp;&nbsp;PLAY</button>

  <div id="intro-hint">🔊 &nbsp;Sound on for the full experience</div>
</div>

<!-- ══════════════════════════════════
     JEU
══════════════════════════════════ -->
<div id="hud">
  <div id="hud-title">🎮 THE EASY GAME</div>
  <div id="hud-stage">Stage <span id="stage-num">1</span> / 8</div>
  <div id="hud-tries">Attempts: <span id="try-num">1</span></div>
</div>

<div id="app">
  <div id="main-content">
    <div id="progress-bar"></div>

    <div id="timer-wrap">
      <svg id="timer-svg" width="80" height="80" viewBox="0 0 80 80">
        <circle id="timer-ring-bg" cx="40" cy="40" r="33" fill="none" stroke-width="5"/>
        <circle id="timer-ring" cx="40" cy="40" r="33" fill="none" stroke-width="5"
          stroke-dasharray="207.3" stroke-dashoffset="0"/>
      </svg>
      <div id="timer-num">10</div>
    </div>

    <div id="narrator-box">
      <span id="narrator-icon">🎙️</span>
      <span id="narrator-text">Try to beat this easy game !!!</span>
    </div>

    <div id="instruction-box">
      <div id="instruction-text">Get ready…</div>
      <div id="sub-instruction"></div>
    </div>

    <div id="game-area"></div>
    <button id="next-btn" onclick="advanceStage()">Next stage →</button>
  </div>

  <div id="win-screen">
    <div id="win-emoji">🏆</div>
    <div id="win-title">CONGRATULATION !!!</div>
    <div id="win-stats"></div>
    <button id="close-btn">CLOSE</button>
  </div>

  <div id="fail-screen">
    <div id="fail-flash"></div>
    <div id="fail-scanlines"></div>
    <div id="fail-content">
      <div id="fail-big">L O S E R !</div>
      <div id="fail-sub-big">— — — — — — —</div>
      <div id="fail-reason-box">
        <div id="fail-msg">You failed.</div>
      </div>
      <button id="fail-retry" onclick="initGame()">Try Again… loser 🔁</button>
      <div id="fail-attempt-count"></div>
    </div>
  </div>
</div>

<div id="feedback-overlay">
  <div id="feedback-msg"></div>
</div>

<script src="buttongame.js"></script>
</body>
</html>
